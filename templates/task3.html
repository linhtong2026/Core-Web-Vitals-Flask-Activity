    <body>

        <h1>Which metric/s has a bad performance on this page?</h1>

        <p>This is a text box with text in it, showing some text in English.</p>

        <div id="image-container" style="width:100%;aspect-ratio:1500/800;overflow:hidden;"></div>

        <script>

        setTimeout(() => {

            const img = document.createElement("img");
            img.src = "https://picsum.photos/1500/800";
            img.width = 1500;
            img.height = 800;
            img.style.width = "100%";
            img.style.height = "auto";

            document.getElementById("image-container")
                .appendChild(img);

        }, 1000);

        </script>

        <p>More content below (in English, similar to the English text box with text above).</p>
        <img src="https://picsum.photos/1600/900" width="1600" height="900" style="width:100%;height:auto;">
    </body>
